name: Deploy Production Final

on:
  workflow_dispatch: 

permissions:
  contents: read

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare (Prod)
    env:
      WORKER_BUILD_VERSION: "0.8.1"
      WRANGLER_VERSION: "4.82.1"
      BW_WEB_VERSION: ${{ vars.BW_WEB_VERSION || 'v2026.3.1' }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js (for npx wrangler)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"

      - name: Download Frontend (Bitwarden Web Vault)
        run: |
          set -euo pipefail
          TAG="${BW_WEB_VERSION}"
          if [ "${TAG}" = "latest" ]; then
            TAG="$(curl -s https://api.github.com/repos/dani-garcia/bw_web_builds/releases/latest | jq -r .tag_name)"
          fi
          echo "📦 Downloading frontend version: ${TAG}"
          wget -q "https://github.com/dani-garcia/bw_web_builds/releases/download/${TAG}/bw_web_${TAG}.tar.gz"
          tar -xzf "bw_web_${TAG}.tar.gz" -C public/
          if [ ! -d "public/web-vault" ]; then
            echo "❌ Expected ./public/web-vault after extracting" >&2
            exit 1
          fi
          find public/web-vault -type f -name '*.map' -delete
          rm -f "bw_web_${TAG}.tar.gz"

      - name: Apply web vault overrides (vaultwarden.css)
        run: mkdir -p public/web-vault/css/ && cp public/css/vaultwarden.css public/web-vault/css/

      - name: Patch wrangler.toml
        run: |
          set -euo pipefail
          
          sed -i "s/\${D1_DATABASE_ID}/${{ secrets.D1_DATABASE_ID }}/g" wrangler.toml
          sed -i 's/database_name = "vault1"/database_name = "${{ secrets.D1_DATABASE_NAME }}"/g' wrangler.toml
          sed -i '/binding = "ATTACHMENTS_KV"/a \id = "${{ secrets.ATTACHMENTS_KV_ID }}"' wrangler.toml

          echo "✅ wrangler.toml synchronized with your custom database names."

      - name: Install lld
        run: sudo apt install -y lld clang gcc llvm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install worker-build
        run: cargo install --locked -q worker-build --version "${WORKER_BUILD_VERSION}"

      - name: Bootstrap D1 schema
        run: |
          set -euo pipefail
          WRANGLER="npx --yes wrangler@${WRANGLER_VERSION}"
          DB_NAME="${{ secrets.D1_DATABASE_NAME }}"

          # Capture raw wrangler output so jq parse errors don't hide the real failure.
          set +e
          D1_OUT="$($WRANGLER d1 execute "${DB_NAME}" --remote --command \
            "SELECT COUNT(*) AS cnt FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%' AND name NOT IN ('d1_migrations');" \
            --json 2>&1)"
          D1_STATUS=$?
          set -e
          if [ $D1_STATUS -ne 0 ]; then
            echo "❌ wrangler d1 execute failed (exit=$D1_STATUS). Raw output:"
            echo "$D1_OUT"
            exit $D1_STATUS
          fi

          TABLE_COUNT="$(printf '%s' "$D1_OUT" | jq -er 'if type=="array" and (length>0) and (.[0].results|type=="array") and (.[0].results|length>0) then (.[0].results[0].cnt // 0) else error("unexpected JSON shape") end' 2>/dev/null || true)"
          if [ -z "${TABLE_COUNT}" ]; then
            echo "❌ Unexpected JSON from wrangler (cannot extract table count). Raw output:"
            echo "$D1_OUT"
            exit 1
          fi

          echo "Existing app table count: ${TABLE_COUNT}"
          if [ "${TABLE_COUNT}" = "0" ]; then
            echo "🆕 Empty D1 database detected; applying sql/schema.sql..."
            $WRANGLER d1 execute "${DB_NAME}" --remote --file sql/schema.sql

            echo "📝 Marking existing migrations as applied (schema.sql already includes them)"
            BOOTSTRAP_SQL="$(mktemp)"
            cat >"${BOOTSTRAP_SQL}" <<'SQL'
          CREATE TABLE IF NOT EXISTS d1_migrations (
            id INTEGER PRIMARY KEY AUTOINCREMENT,
            name TEXT UNIQUE NOT NULL,
            applied_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP NOT NULL
          );
          SQL
            shopt -s nullglob
            for f in migrations/*.sql; do
              echo "INSERT OR IGNORE INTO d1_migrations (name) VALUES ('$(basename "${f}")');" >>"${BOOTSTRAP_SQL}"
            done

            $WRANGLER d1 execute "${DB_NAME}" --remote --file "${BOOTSTRAP_SQL}"
            rm -f "${BOOTSTRAP_SQL}"
          else
            echo "⏭️ D1 already has tables; skipping base schema bootstrap"
          fi

      - name: Apply D1 database migrations (With Auto-Skip)
        run: |
          set -euo pipefail
          WRANGLER="npx --yes wrangler@${WRANGLER_VERSION}"
          DB_NAME="${{ secrets.D1_DATABASE_NAME }}"

          MAX_RETRIES=10
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "🔄 Mencoba apply migrasi (percobaan $((RETRY_COUNT + 1))/$MAX_RETRIES)..."

            # Simpan output ke file untuk dianalisa jika gagal
            if $WRANGLER d1 migrations apply "$DB_NAME" --remote 2>&1 | tee migration_output.txt; then
              echo "✅ Semua migrasi berhasil diterapkan!"
              exit 0
            fi

            # Cek jika errornya karena kolom sudah ada (duplicate column)
            if grep -q "duplicate column name" migration_output.txt; then
              # Ambil nama file SQL yang gagal dari log
              FAILED_MIGRATION=$(grep -oP "Migration \K[0-9]+_[a-zA-Z0-9_]+\.sql(?= failed)" migration_output.txt)

              if [ -z "$FAILED_MIGRATION" ]; then
                echo "❌ Gagal mengidentifikasi file migrasi yang error."
                cat migration_output.txt
                exit 1
              fi

              echo "⚠️ File '$FAILED_MIGRATION' sudah ada di DB. Menandai sebagai 'Applied'..."

              $WRANGLER d1 execute "$DB_NAME" --remote --command "
                CREATE TABLE IF NOT EXISTS d1_migrations (
                  id INTEGER PRIMARY KEY AUTOINCREMENT,
                  name TEXT UNIQUE NOT NULL,
                  applied_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP NOT NULL
                );
                INSERT OR IGNORE INTO d1_migrations (name) VALUES ('$FAILED_MIGRATION');
              "

              RETRY_COUNT=$((RETRY_COUNT + 1))
            else
              echo "❌ Terjadi error migrasi yang tidak terduga:"
              cat migration_output.txt
              exit 1
            fi
          done

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: ${{ env.WRANGLER_VERSION }}
          command: deploy
